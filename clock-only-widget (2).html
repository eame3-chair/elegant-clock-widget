<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clock Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&family=DM+Sans:wght@200;300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: transparent;
      --surface: #f5ede9;
      --ink: #1a1a18;
      --ink-muted: #9a8880;
      --accent: #B59259;
      --border: rgba(0,0,0,0.08);
      --divider: rgba(0,0,0,0.06);
      --radius: 16px;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
    }

    .widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 22px 24px;
      width: 100%;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .day-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .time {
      font-family: 'DM Serif Display', serif;
      font-size: 61px;
      font-weight: 300;
      color: #47403a;
      letter-spacing: 0.03em;
      line-height: 0.85;
      position: relative;
      top: 0.6px;
      margin-top: 10.3px;
    }

    .time .colon {
      display: inline-block;
      animation: blink 1s step-start infinite;
      color: var(--accent);
      font-size: 36px;
      vertical-align: middle;
      position: relative;
      top: -8px;
      margin: 0 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }
  </style>
</head>
<body>
  <div class="widget">
    <div style="font-family:'DM Serif Display',serif; font-size:13px; font-weight:400; letter-spacing:0.04em; color:var(--ink-muted); text-align:center;">Time Now:</div>
    <div style="width:100%; height:1px; background:rgba(0,0,0,0.06); margin: 10.3px 0 10.3px;"></div>
    <div class="time">
      <span id="hh">12</span><span class="colon">:</span><span id="mm">00</span>
    </div>
  </div>
  <script>
    function pad(n) { return String(n).padStart(2, '0'); }
    function tick() {
      const now = new Date();
      document.getElementById('hh').textContent = pad(now.getHours());
      document.getElementById('mm').textContent = pad(now.getMinutes());
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
