<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clock Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&family=DM+Sans:wght@200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: transparent;
      --surface: #f5ede9;
      --ink: #1a1a18;
      --ink-muted: #9a8880;
      --accent: #B59259;
      --border: rgba(0,0,0,0.08);
      --radius: 16px;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      padding: 0;
    }

    .widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 24px 14px;
      text-align: center;
      box-shadow: none;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .time {
      font-family: 'DM Serif Display', serif;
      font-size: 60px;
      font-weight: 300;
      color: #4a4a46;
      letter-spacing: 0.02em;
      line-height: 1;
      margin-bottom: 5px;
    }

    .time .colon {
      display: inline-block;
      animation: blink 1s step-start infinite;
      color: var(--accent);
      font-size: 36px;
      vertical-align: middle;
      position: relative;
      top: -8px;
      margin: 0 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

    .date-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--ink-muted);
      letter-spacing: 0.09em;
      margin-top: 6px;
    }
    
    .date {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
      margin-top: 6px;
    }
    
    .timezone { display: none; }
  </style>
</head>
<body>
  <div class="widget">

    <div class="time" id="time">
      <span id="hh">12</span><span class="colon">:</span><span id="mm">00</span>
    </div>
    <div class="date" id="date"></div>
    <div class="timezone" id="timezone"></div>


  </div>

  <script>
    const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    document.getElementById('timezone').textContent = tz.replace(/_/g, ' ').replace('/', ' / ');

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const now = new Date();
      const h   = now.getHours();
      const m   = now.getMinutes();

      document.getElementById('hh').textContent = pad(h);
      document.getElementById('mm').textContent = pad(m);

      document.getElementById('date').textContent =
        `TODAY IS: ${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]}`;
    }


    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
